<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 350px;
      font-family: sans-serif;
      background-color: #0b0f19;
      color: #f8fafc;
      margin: 0;
      padding: 16px;
    }
    .brand {
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 12px;
    }
    .brand span { color: #a3e635; }
    .btn {
      background: linear-gradient(to right, #a3e635, #34d399);
      color: #020617;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    #status { font-size: 12px; color: #94a3b8; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="brand">AltSpend<span>.com</span> Mini</div>
  <p style="font-size: 12px; color: #94a3b8;">Audit this active product tab context instantly.</p>
  <button id="auditBtn" class="btn">Analyze This Product Page</button>
  <div id="status">Ready to audit...</div>

  <script src="popup.js"></script>
</body>
</html>
